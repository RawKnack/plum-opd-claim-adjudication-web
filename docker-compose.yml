services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: plum
      POSTGRES_PASSWORD: plum
      POSTGRES_DB: plum_claims
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plum -d plum_claims"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://plum:plum@postgres:5432/plum_claims
      - UPLOAD_DIR=uploads
      - DEBUG=true
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
