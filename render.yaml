services:
  - type: web
    name: plum-claims-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plum-claims-db
          property: connectionString
      - key: UPLOAD_DIR
        value: uploads
      - key: DEBUG
        value: "false"
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: plum-claims-db
    plan: free
    postgresMajorVersion: "16"
